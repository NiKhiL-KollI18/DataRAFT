name: Build DataRAFT Installers

# This triggers the workflow whenever you push to the 'main' branch,
# or you can click a button to run it manually from the GitHub UI.
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    # This creates three separate servers simultaneously
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            generator: "WIX"
            ext: "msi"
          - os: ubuntu-latest
            generator: "DEB;RPM"
            ext: "deb" # We will capture both deb and rpm
          - os: macos-latest
            generator: "DragNDrop"
            ext: "dmg"

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # ---------------------------------------------------------
      # DEPENDENCY INSTALLATION
      # ---------------------------------------------------------
      - name: Install OpenSSL & WiX (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install openssl -y
          # WiX v3 is pre-installed on GitHub Windows runners!

      - name: Install OpenSSL (Ubuntu/Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev rpm

      - name: Install OpenSSL (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openssl@3

      # ---------------------------------------------------------
      # CMAKE CONFIGURATION & BUILD
      # ---------------------------------------------------------
      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build DataRAFT
        run: cmake --build build --config Release -j 4

      # ---------------------------------------------------------
      # CPACK: GENERATE INSTALLERS
      # ---------------------------------------------------------
      - name: Run CPack (Windows)
        if: runner.os == 'Windows'
        run: |
          cd build
          cpack -C Release -G ${{ matrix.generator }}

      - name: Run CPack (Linux & macOS)
        if: runner.os != 'Windows'
        run: |
          cd build
          cpack -G "${{ matrix.generator }}"

      # ---------------------------------------------------------
      # ORGANIZE & UPLOAD ARTIFACTS
      # ---------------------------------------------------------
      - name: Organize Build Folders
        shell: bash
        run: |
          # 1. Determine the clean folder name based on the OS
          if [ "${{ runner.os }}" == "Windows" ]; then TARGET_DIR="windows"; fi
          if [ "${{ runner.os }}" == "Linux" ]; then TARGET_DIR="linux"; fi
          if [ "${{ runner.os }}" == "macOS" ]; then TARGET_DIR="macos"; fi
          
          # 2. Create the target directory (e.g., builds/windows)
          mkdir -p builds/$TARGET_DIR
          
          # 3. Move the generated installers into the new folder
          # (The 2>/dev/null || true prevents errors if a specific file type doesn't exist)
          mv build/*.msi builds/$TARGET_DIR/ 2>/dev/null || true
          mv build/*.deb builds/$TARGET_DIR/ 2>/dev/null || true
          mv build/*.rpm builds/$TARGET_DIR/ 2>/dev/null || true
          mv build/*.dmg builds/$TARGET_DIR/ 2>/dev/null || true

      - name: Upload Organized Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DataRAFT-${{ runner.os }}-Build
          # Upload the entire 'builds' tree instead of just the raw files
          path: builds/